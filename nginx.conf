server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS resolver, IPv4 only
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend running on the host
    location /api/ {
        set $upstream http://host.docker.internal:8080;
        proxy_pass $upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Angular app — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
