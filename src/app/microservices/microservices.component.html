<main class="container">
  <div class="bg-body-tertiary p-5 rounded mt-3">
    <h1>Microservices</h1>
    <p class="lead">
      A microservice is an application that runs its own process as a service and communicates via lightweight
      mechanisms. Here you register your microservices to collect metrics from them.
    </p>

    <button class="btn btn-primary" (click)="openModal()">New Microservice</button>

    <ng-template #modalContent let-modal>
      <div class="bg-body-tertiary p-5 rounded mt-1">
        <h1>New Microservice</h1>
        <br />
        <form [formGroup]="microserviceForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" formControlName="name"
              placeholder="Enter microservice name"
              [class.is-invalid]="microserviceForm.get('name')?.invalid && microserviceForm.get('name')?.touched" />
            <div class="invalid-feedback">Name is required.</div>
          </div>
          <div class="d-flex justify-content-between mt-3">
            <button type="button" class="btn btn-outline-primary" aria-label="Close" (click)="modal.dismiss()">
              Close
            </button>
            <button type="submit" class="btn btn-primary" [disabled]="microserviceForm.invalid">
              Register Microservice
            </button>
          </div>
        </form>
      </div>
    </ng-template>
  </div>

  <div class="bg-body-tertiary mt-3" *ngIf="currentMicroservices.length > 0">
    <table class="table table-striped-columns table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let ms of currentMicroservices">
          <td>{{ ms.id }}</td>
          <td>{{ ms.name }}</td>
          <td>
            <button class="btn btn-outline-danger btn-sm" (click)="deleteMicroservice(ms.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
